<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard 💗</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">

        <a href="/" class="logo-link">
            <img th:src="@{/images/logo1.png}" alt="Logo" class="logo">
        </a>

        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/menu}">Menu</a>
            <a th:href="@{/order}">Order</a>
            <a th:href="@{/about}">About</a>
            <a th:href="@{/contact}">Contact</a>
            <a th:href="@{/admin}">Admin</a>
        </div>
    </div>
</nav>

<div class="container">
    <h1>📊 Orders Dashboard</h1>

    <p>Total Orders: <strong th:text="${orders.size()}"></strong></p>

    <a href="/export" class="btn">⬇ Download Orders</a>

    <table>
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Item</th>
            <th>Size</th>
        </tr>

        <tr th:each="order, stat : ${orders}">
            <td th:text="${stat.index + 1}"></td>
            <td th:text="${order.name}"></td>
            <td th:text="${order.item}"></td>
            <td th:text="${order.size} + 'L'"></td>
        </tr>

    </table>
</div>

</body>
</html>
