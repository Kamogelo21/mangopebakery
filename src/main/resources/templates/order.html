<form action="/submitOrder" method="post">
    <label>Name:</label>
    <input type="text" name="name" required>

    <label>Item:</label>
    <input type="text" name="item" required>

    <label>Quantity:</label>
    <input type="number" name="quantity" required>

    <button type="submit">Order 💕</button>
</form>
