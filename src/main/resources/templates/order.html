<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order 💗</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">

        <a href="/" class="logo-link">
            <img th:src="@{/images/logo1.png}" alt="Logo" class="logo">
        </a>

        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/menu}">Menu</a>
            <a th:href="@{/order}">Order</a>
            <a th:href="@{/about}">About</a>
            <a th:href="@{/contact}">Contact</a>
        </div>
    </div>
</nav>

<div class="order-title">
    <h1>Place Your Order 💗</h1>

    <form th:action="@{/submitOrder}" method="post" th:object="${order}" onsubmit="prepareOrder()">
        <!--Customer info-->
        <div class="customer-info">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="text" name="phone" placeholder="Phone Number" required>
        </div>

        <h3>Select Items & Quantities</h3>

        <div class="order-box">
            <select id="item">
                <option value="">Select Item</option>

                <option value="Assorted Biscuits">Assorted Biscuits</option>
                <option value="Eat Sumore">Eat Sumore</option>
                <option value="Flavoured Scones">Flavoured Scones</option>
                <option value="Ginger Biscuits">Ginger Biscuits</option>
                <option value="Jam Tarts">Jam Tarts</option>
                <option value="Lamingtons">Lamingtons</option>
                <option value="Lemon Creams">Lemon Creams</option>
                <option value="Melting Moments">Melting Moments</option>
                <option value="Queens Cakes">Queens Cakes</option>
                <option value="Romany Creams">Romany Creams</option>
                <option value="Snowballs / Red Cake">Snowballs / Red Cake</option>
                <option value="Plain Scones">Plain Scones</option>
            </select>

            <select id="size">
                <option value="">Size</option>
                <option value="5">5L</option>
                <option value="10">10L</option>
                <option value="20">20L</option>
            </select>

            <input type="number" id="qty" min="1" value="1">

            <button type="button" onclick="addItem()">Add</button>

        </div>

        <!-- ORDER SUMMARY -->
        <div id="orderSummary" class="order-summary">
            <h3>Your Order</h3>
            <ul id="orderList"></ul>
        </div>

        <!-- HIDDEN FIELD FOR BACKEND -->
        <input type="hidden" name="orderDetails" id="orderDetails">

        <button type="submit">Order 💕</button>
    </form>

    <p class="notice" style="color: red; font-size: 14px;">
        ⚠ Orders require at least a day's notice. We will reach out to you to confirm details.
    </p>
</div>

<!--<script src="/js/order.js"></script>-->

<footer>
        <div class="footer-contacts">
            <p> For inquiries: </p>
            <a href="https://wa.me/27685962483" target="_blank">
                <img src="/images/whatsapp.jpg" alt="WhatsApp" class="footer-icon">
                <p> WhatsApp us </p>
            </a>
            <a href="mailto:ashleymotapane1@outlook.com">
                <img src="/images/email.jpg" alt="Email" class="footer-icon">
                <p> Email us </p>
            </a>
        </div>

        <p class="footer-copy">
            &copy; 2026 Mangope Bakery & Fast Food. All Rights Reserved.
        </p>
</footer>
<script src="/js/order.js"></script>
</body>
</html>
