<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Menu</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav>
    <a th:href="@{/}">Home</a>
    <a th:href="@{/menu}">Menu</a>
    <a th:href="@{/order}">Order</a>
</nav>

<div class="container">
    <h1>Place Your Order 💗</h1>

    <form action="/submitOrder" method="post" th:object="${order}">
        <input type="text" th:field="*{name}" placeholder="Your Name" required><br>
        <input type="text" th:field="*{item}" placeholder="Item" required><br>
        <input type="number" th:field="*{quantity}" placeholder="Quantity" required><br>
        <button type="submit">Order 💕</button>
    </form>
</div>

</body>
</html>
